<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Dukcapil Kemendagri</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #1a365d;
            background-image:
                linear-gradient(rgba(26, 54, 93, 0.92), rgba(30, 58, 138, 0.95)),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><pattern id="books" x="0" y="0" width="120" height="160" patternUnits="userSpaceOnUse"><rect x="10" y="20" width="25" height="120" fill="%23ffffff" opacity="0.03"/><rect x="40" y="30" width="25" height="110" fill="%23ffffff" opacity="0.04"/><rect x="70" y="15" width="25" height="125" fill="%23ffffff" opacity="0.03"/><rect x="15" y="25" width="20" height="5" fill="%23ffffff" opacity="0.02"/><rect x="45" y="35" width="20" height="5" fill="%23ffffff" opacity="0.02"/><rect x="75" y="20" width="20" height="5" fill="%23ffffff" opacity="0.02"/></pattern><pattern id="passport" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="30" fill="%23ffffff" opacity="0.02"/><rect x="35" y="55" width="30" height="3" fill="%23ffffff" opacity="0.02"/><rect x="35" y="60" width="30" height="3" fill="%23ffffff" opacity="0.02"/><rect x="35" y="65" width="30" height="3" fill="%23ffffff" opacity="0.02"/></pattern></defs><rect width="1200" height="800" fill="url(%23books)"/><rect width="1200" height="800" fill="url(%23passport)" opacity="0.5"/><path d="M0,400 Q300,350 600,400 T1200,400" fill="none" stroke="%23ffffff" stroke-width="1" opacity="0.05"/><path d="M0,500 Q300,450 600,500 T1200,500" fill="none" stroke="%23ffffff" stroke-width="1" opacity="0.05"/></svg>');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* Decorative overlay patterns */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .header-section {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-container img {
            height: 80px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
            animation: fadeInDown 0.8s ease;
        }

        .header-text {
            color: #1e293b;
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.6;
            animation: fadeInUp 0.8s ease;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: fadeInUp 1s ease;
        }

        .card-body {
            padding: 40px;
        }

        .status-badge {
            display: inline-block;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            animation: pulse 2s infinite;
        }

        .form-group {
            margin-bottom: 28px;
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            border-left: 4px solid #3b82f6;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .form-group:hover {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .label {
            font-weight: 600;
            color: #475569;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .sub-label {
            font-weight: 500;
            font-size: 16px;
            color: #1e293b;
            margin: 0;
            padding-top: 5px;
        }

        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, #3b82f6 0%, transparent 100%);
            border: none;
            margin: 15px 0;
        }

        .info-section {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            color: white;
            padding: 25px;
            border-radius: 16px;
            margin: 20px 0;
            box-shadow: 0 8px 24px rgba(30, 64, 175, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-section .label {
            color: rgba(255, 255, 255, 0.95);
            font-size: 12px;
        }

        .info-section .sub-label {
            color: white;
            font-weight: 600;
        }

        .date-time-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin: 5px;
            font-weight: 500;
            color: #1e293b;
        }

        .date-time-box i {
            color: #3b82f6;
            font-size: 16px;
        }

        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .icon-wrapper i {
            color: #3b82f6;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .akta-number {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            letter-spacing: 1px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .card-body {
                padding: 25px;
            }

            .form-group {
                padding: 15px;
            }

            .header-text {
                font-size: 0.95rem;
            }
        }

        /* Document/Book decoration elements */
        .card-body::before {
            content: '';
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.1) 100%);
            border-radius: 50%;
            pointer-events: none;
        }

        .card-body::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08) 0%, rgba(5, 150, 105, 0.08) 100%);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="row">
            <div class="col-12">
                <div class="header-section">
                    <div class="row align-items-center">
                        <div class="col-lg-2 col-md-12 text-center mb-3 mb-lg-0">
                            <div class="logo-container">
                                <img src="assets/logo.png" alt="logo">
                            </div>
                        </div>
                        <div class="col-lg-10 col-md-12 text-center text-lg-start">
                            <div class="header-text">
                                DIREKTORAT JENDERAL KEPENDUDUKAN DAN PENCATATAN SIPIL
                            </div>
                            <div class="header-text" style="font-size: 1rem; font-weight: 500;">
                                Kementerian Dalam Negeri Republik Indonesia
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="row">
            <div class="col-lg-8 col-md-12 mx-auto">
                <div class="card main-card">
                    <div class="card-body" style="position: relative;">
                        <div class="form-group">
                            <label for="status" class="label">Status Dokumen</label>
                            <span class="status-badge">
                                <i class="fas fa-check-circle"></i> AKTIF
                            </span>
                        </div>

                        <div class="form-group">
                            <label for="suami" class="label">Nama Suami</label>
                            <p class="sub-label">I KADEK ADI WIDANA</p>
                        </div>

                        <div class="form-group">
                            <label for="istri" class="label">Nama Istri</label>
                            <p class="sub-label">NI KADEK SEPIA YULIANTI</p>
                        </div>

                        <div class="form-group">
                            <label for="tanggal-kawin" class="label">Tanggal Kawin</label>
                            <p class="sub-label">28 Agustus 2025</p>
                        </div>

                        <div class="form-group" style="border-left-color: #f59e0b;">
                            <label for="akta" class="label">Nomor Akta</label>
                            <div class="akta-number">3201-KW-28082025-0001</div>
                        </div>

                        <div class="info-section">
                            <label for="info" class="label">
                                <i class="fas fa-user-pen"></i> Informasi Penandatangan
                            </label>
                            <hr class="section-divider" style="background: rgba(255,255,255,0.3);">

                            <div class="row mt-3">
                                <div class="col-md-6 mb-3">
                                    <label for="daerah" class="label">Daerah</label>
                                    <p class="sub-label">Personal</p>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lembaga" class="label">Lembaga</label>
                                    <p class="sub-label">-</p>
                                </div>
                            </div>

                            <div class="mt-2">
                                <label for="penandatanganan" class="label">Penandatangan</label>
                                <p class="sub-label">DEWA GDE JULI ARTAWAN</p>
                            </div>
                        </div>

                        <div class="form-group" style="border-left-color: #10b981;">
                            <label for="info" class="label">
                                <i class="fas fa-info-circle"></i> Informasi Pemindaian
                            </label>
                            <hr class="section-divider">

                            <label for="tanggal-pindai" class="label">Tanggal Pindai</label>
                            <div class="mt-2">
                                <div class="date-time-box date">
                                    <i class="fa fa-calendar-days"></i>
                                    <span>Loading...</span>
                                </div>
                                <div class="date-time-box time">
                                    <i class="fa fa-clock"></i>
                                    <span>Loading...</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-group" style="border-left-color: #8b5cf6;">
                            <label for="tanggal-penandatanganan" class="label">
                                <i class="fas fa-signature"></i> Tanggal Penandatanganan
                            </label>
                            <div class="mt-2">
                                <div class="icon-wrapper">
                                    <i class="fa fa-calendar-days"></i>
                                    <span>30 Agustus 2025</span>
                                </div>
                                <div class="icon-wrapper">
                                    <i class="fa fa-clock"></i>
                                    <span>13:04:44</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script>
        function updateDateTime() {
            var currentdate = new Date();
            var months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

            var day = currentdate.getDate();
            var month = months[currentdate.getMonth()];
            var year = currentdate.getFullYear();
            var dateStr = day + " " + month + " " + year;

            var hours = String(currentdate.getHours()).padStart(2, '0');
            var minutes = String(currentdate.getMinutes()).padStart(2, '0');
            var seconds = String(currentdate.getSeconds()).padStart(2, '0');
            var timeStr = hours + ":" + minutes + ":" + seconds;

            $('.date span').text(dateStr);
            $('.time span').text(timeStr);
        }

        // Update immediately and every second
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>


</html>
